<!DOCTYPE html>
<html lang="en-us">

{% include head.html %}

<body class="theme-base-custom">

{% include navbar.html %}

<div class="wrap">
  <div class="container content">
    {{ content }}
  </div>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <p class="footer-bio">{{ site.description }}</p>
        <nav class="footer-nav">
          <a href="{{ site.baseurl }}/" class="nav-link">Blog</a>
          <a href="{{ site.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
          <a href="{{ site.twitter }}" target="_blank" rel="noopener">X</a>
          <a href="{{ site.github.repo }}" target="_blank" rel="noopener">GitHub</a>
          <a href="{{ site.rss }}" target="_blank" rel="noopener">RSS</a>
        </nav>
        <p class="footer-copy">&copy; {{ site.time | date: '%Y' }} Mikołaj Kania. All rights reserved.</p>
      </div>
    </div>
  </footer>
</div>

</body>
</html>
